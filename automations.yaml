- id: '1767265312688'
  alias: Arbeitslicht einschalten
  description: ''
  triggers:
  - trigger: numeric_state
    entity_id:
    - sensor.eve_energy_schreibtisch_leistung
    above: 20
    id: energy_on
    for:
      hours: 0
      minutes: 0
      seconds: 5
  - trigger: numeric_state
    entity_id:
    - sensor.eve_energy_schreibtisch_leistung
    below: 20
    id: energy_off
    for:
      hours: 0
      minutes: 0
      seconds: 5
  conditions:
  - condition: sun
    after: sunset
    after_offset: -00:15:00
    before: sunrise
    before_offset: 00:15:00
    enabled: true
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - energy_on
      sequence:
      - action: scene.create
        metadata: {}
        data:
          scene_id: temp_wohnzimmer_leuchten
          snapshot_entities:
          - light.wohnzimmer
      - action: scene.turn_on
        metadata: {}
        data:
          transition: 3
        target:
          entity_id: scene.working
    - conditions:
      - condition: trigger
        id:
        - energy_off
      sequence:
      - action: scene.turn_on
        metadata: {}
        target:
          entity_id: scene.temp_wohnzimmer_leuchten
        data:
          transition: 10
  mode: single
- id: '1767279764764'
  alias: Schalte Wohnzimmer ein
