  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - motion_on
      - condition: state
        entity_id: light.flur
        state:
        - 'off'
        enabled: true
      - condition: or
        conditions:
        - condition: state
          entity_id: light.kuche_2
          state:
          - 'off'
          enabled: true
        - condition: state
          entity_id: light.badezimmer_2
          state:
          - 'off'
          enabled: true
      - condition: sun
        before: sunrise
        before_offset: 00:15:00
        after: sunset
        after_offset: -00:15:00
      - condition: time
        before: '23:15:00'
      sequence:
      - action: scene.create
        metadata: {}
        data:
          scene_id: temp_floor_lamps
          snapshot_entities:
          - light.flur
      - choose:
        - conditions:
          - condition: time
            after: '21:30:00'
            before: 07:00:00
          sequence:
          - action: scene.turn_on
            metadata: {}
            target:
              entity_id: scene.flur_spiegel_gedimmt
            data:
              transition: 2
        default:
        - action: scene.turn_on
          metadata: {}
          target:
            entity_id: scene.flur_spiegel
          data:
            transition: 2
    - conditions:
      - condition: trigger
        id:
        - motion_off
      sequence:
      - action: scene.turn_on
        metadata: {}
        target:
          entity_id: scene.temp_floor_lamps
        data:
          transition: 2
  mode: single
