    - 'on'
    id: motion_on
  - trigger: state
    entity_id:
    - binary_sensor.bewegungsbereich
    to:
    - 'off'
    id: motion_off
    for:
      hours: 0
      minutes: 15
      seconds: 0
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - motion_on
      - condition: state
        entity_id: light.wohnzimmer
        state:
        - 'off'
      - condition: sun
        after: sunset
        after_offset: -00:15:00
        before: sunrise
        before_offset: 00:15:00
      - condition: time
        before: '23:00:00'
        after: 08:00:00
      sequence:
      - action: scene.turn_on
        metadata: {}
        data:
          transition: 3
        target:
          entity_id: scene.wohnzimmer
  mode: single
